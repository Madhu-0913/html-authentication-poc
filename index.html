<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">


<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">


<link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">


<div class="card shadow p-4" style="width: 400px; border-radius: 12px;">
    

  <h3 class="text-center text-primary mb-4">Login</h3>

  <form action="dashboard.html" method="GET">

  <div class="mb-3">
    <label class="form-label">Username</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-person"></i></span>
      <input type="text" class="form-control" placeholder="Enter username" required>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Email address</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-envelope"></i></span>
      <input type="email" class="form-control" placeholder="Enter email" required>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Password</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-lock"></i></span>
      <input type="password" class="form-control" placeholder="Enter Password" required>
      <pattern="^(?=.[0-9])(?=.[!@#$%^&])[A-Za-z0-9!@#$%^&]{8,}$">
    </div>
  </div>

  <button type="submit" class="btn btn-primary w-100 mb-3">
    Login
  </button>

</form>

  <div class="text-center">
    <a href="register.html" class="text-decoration-none fw-semibold text-primary">Create Account</a>
    <br>
    <a href="forgot-password.html" class="text-decoration-none text-muted">Forgot Password?</a>
  </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
