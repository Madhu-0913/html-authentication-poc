<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<link rel="stylesheet" href="styles.css">
<form action="index.html"></form>
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">
<div class="card shadow p-4" style="width: 400px; border-radius: 12px;">
  
  <h4 class="text-center text-primary mb-4">Reset Password</h4>

  <form action="index.html" method="GET">

  <!-- New Password -->
  <div class="mb-3">
    <label class="form-label">New Password</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-lock"></i></span>
      <input type="password" class="form-control" placeholder="Enter New Password" required>
    </div>
  </div>

  <!-- Confirm Password -->
  <div class="mb-3">
    <label class="form-label">Confirm Password</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
      <input type="password" class="form-control" placeholder="Enter Confirm Password" required>
    </div>
  </div>

  <button type="submit" class="btn btn-primary w-100 mt-2">
    Update Password
  </button>

</form>

  <!-- Back to Login -->
  <div class="text-center mt-3">
    
    <a href="index.html">Back to Login</a>
  </div>
</div>

<script>
function togglePassword(fieldId, iconSpan) {
  const input = document.getElementById(fieldId);
  const icon = iconSpan.querySelector("i");

  if (input.type === "password") {
    input.type = "text";
    icon.classList.remove("bi-eye");
    icon.classList.add("bi-eye-slash");
  } else {
    input.type = "password";
    icon.classList.remove("bi-eye-slash");
    icon.classList.add("bi-eye");
  }
}
</script>

</body>
</html>
