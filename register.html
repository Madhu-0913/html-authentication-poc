<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<link rel="stylesheet" href="styles.css">

</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4" style="width: 400px; border-radius: 12px;">
  
  <h3 class="text-center text-primary mb-4">Register</h3>

    <form class="needs-validation" novalidate onsubmit="return handleRegister(event)">

  <!-- Full Name -->
  <div class="mb-3">
    <label class="form-label">Full Name</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-person"></i></span>
      <input type="text" class="form-control" placeholder="Enter full name" required>
    </div>
    <div class="invalid-feedback">
      Please enter your name.
    </div>
  </div>

  <!-- Email -->
  <div class="mb-3">
    <label class="form-label">Email address</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-envelope"></i></span>
      <input type="email" class="form-control" placeholder="Enter email" required>
    </div>
    <div class="invalid-feedback">
      Please enter a valid email.
    </div>
  </div>

  <!-- Password -->
  <div class="mb-3">
    <label class="form-label">Password</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-lock"></i></span>
      <input type="password" class="form-control"placeholder="Enter password" required
      >
    </div>
  </div>

  <!-- Confirm Password -->
  <div class="mb-3">
    <label class="form-label">Confirm Password</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
      <input type="password" class="form-control"placeholder="Enter confirm Password" required>

    </div>
  </div>

  <!-- Submit Button -->
  <button type="submit" class="btn btn-success w-100 mt-2">
    Register
  </button>

</form>

  <!-- Back to Login -->
  <div class="text-center mt-3">
    <a href="index.html" class="text-decoration-none">Back to Login</a>
  </div>

</div>

<script>
function handleRegister(event) {
  event.preventDefault();

  alert("Registration Successful!");
  window.location.href = "index.html";

  return false;
}
</script>
